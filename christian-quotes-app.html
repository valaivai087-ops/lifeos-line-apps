        // DOM elements
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const quotesContainer = document.getElementById('quotesContainer');
        const statsDiv = document.getElementById('stats');
        
        let currentFilter = 'all';
        let expandedCards = new Set();
        
        // Filter range check
        function isInRange(num) {
            const numInt = parseInt(num);
            if (currentFilter === 'all') return true;
            const [start, end] = currentFilter.split('-').map(Number);
            return numInt >= start && numInt <= end;
        }
        
        // Search filter
        function matchesSearch(quote, searchTerm) {
            if (!searchTerm) return true;
            const lower = searchTerm.toLowerCase();
            return quote.zh.toLowerCase().includes(lower) || 
                   quote.en.toLowerCase().includes(lower);
        }
        
        // Render quotes
        function renderQuotes() {
            quotesContainer.innerHTML = '';
            const filteredQuotes = quotesData.filter(q => 
                isInRange(q.num) && matchesSearch(q, searchInput.value)
            );
            
            filteredQuotes.forEach(quote => {
                const card = document.createElement('div');
                card.className = 'quote-card';
                if (expandedCards.has(quote.num)) {
                    card.classList.add('expanded');
                }
                
                card.innerHTML = `
                    <div class="quote-number">#${quote.num} <span class="expand-icon">▼</span></div>
                    <div class="quote-content">
                        <div class="quote-chinese">${quote.zh}</div>
                        <div class="quote-english">"${quote.en}"</div>
                    </div>
                    <div class="quote-actions">
                        <button class="tts-btn" onclick="speakChinese('${quote.zh.replace(/'/g, "\\'")}', this)">
                            🔊 中文
                        </button>
                        <button class="tts-btn" onclick="speakEnglish('${quote.en.replace(/'/g, "\\'")}', this)">
                            🔊 English
                        </button>
                    </div>
                `;
                
                card.addEventListener('click', (e) => {
                    if (!e.target.closest('.tts-btn')) {
                        if (expandedCards.has(quote.num)) {
                            expandedCards.delete(quote.num);
                        } else {
                            expandedCards.add(quote.num);
                        }
                        renderQuotes();
                    }
                });
                
                quotesContainer.appendChild(card);
            });
            
            statsDiv.textContent = `显示 ${filteredQuotes.length} / ${quotesData.length} 金句 | Showing ${filteredQuotes.length} / ${quotesData.length} quotes`;
        }
        
        // Text-to-speech Chinese
        window.speakChinese = function(text, btn) {
            if (!('speechSynthesis' in window)) {
                alert('你的瀏覽器不支持語音功能\nYour browser does not support speech synthesis');
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.8;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            btn.classList.add('playing');
            btn.textContent = '🔊 中文 (播放中...)';
            
            utterance.onend = () => {
                btn.classList.remove('playing');
                btn.textContent = '🔊 中文';
            };
            
            utterance.onerror = (e) => {
                console.error('Speech error:', e);
                btn.classList.remove('playing');
                btn.textContent = '🔊 中文 (失敗)';
                setTimeout(() => { btn.textContent = '🔊 中文'; }, 2000);
            };
            
            window.speechSynthesis.cancel();
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 100);
        };
        
        // Text-to-speech English
        window.speakEnglish = function(text, btn) {
            if (!('speechSynthesis' in window)) {
                alert('Your browser does not support speech synthesis\n你的瀏覽器不支持語音功能');
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            btn.classList.add('playing');
            btn.textContent = '🔊 English (Playing...)';
            
            utterance.onend = () => {
                btn.classList.remove('playing');
                btn.textContent = '🔊 English';
            };
            
            utterance.onerror = (e) => {
                console.error('Speech error:', e);
                btn.classList.remove('playing');
                btn.textContent = '🔊 English (Failed)';
                setTimeout(() => { btn.textContent = '🔊 English'; }, 2000);
            };
            
            window.speechSynthesis.cancel();
            setTimeout(() => {
                window.speechSynthesis.speak(utterance);
            }, 100);
        };
        
        // Event listeners
        searchInput.addEventListener('input', renderQuotes);
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.range;
                expandedCards.clear();
                renderQuotes();
            });
        });
        
        // Initial render
        renderQuotes();
    </script>
</body>
</html>
