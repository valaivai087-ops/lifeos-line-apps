                    { title: '發炎指數 | Inflammation', items: '高敏感C反應蛋白 hs-CRP, 紅血球沉降速率 ESR, 鐵蛋白 Ferritin, 白血球 WBC, 中性粒細胞淋巴球比 NLR' },
                    { title: '免疫標誌 | Immune', items: '淋巴球 ALC, CD4細胞, CD8細胞, NK細胞, CD4/CD8比值' },
                    { title: '肝臟功能 | Liver Function', items: '麗轉氨酶 AST, 丙轉氨酶 ALT, 伽瑪麩胺酸轉移酶 GGT, 鹼性磷酸酶 ALP, 白蛋白 Albumin' },
                    { title: '腎臟功能 | Kidney Function', items: '肌酸酐 Creatinine, 推算腎絲球過濾率 eGFR, 血尿素氮 BUN, 尿酸 Uric Acid, 尿蛋白' },
                    { title: '營養標誌 | Nutrition', items: '維生素D, 維生素B12, 葉酸 Folate, 鋅 Zinc, 鎂 Magnesium' },
                    { title: '氧化壓力 | Oxidative Stress', items: '穀胱甘肽 GSH, 氧化穀胱甘肽 GSSG, 氧化低密度脂蛋白 OxLDL, 同型半胱胺酸 Homocysteine, 輔酶Q10 CoQ10' },
                    { title: '荷爾蒙 | Hormones', items: '皮質醇 Cortisol, DHEA-S, 睪酮 Testosterone, 雌二醇 Estradiol, 促甲狀腺激素 TSH, 遊離T3, 遊離T4, 類胰島素生長因子-1 IGF-1' },
                    { title: '心血管 | Cardiovascular', items: '血壓 Blood Pressure, 靜息心率 Resting Heart Rate, 心率變異性 HRV' }
                ]
            },
            ch15: {
                titleCn: '第十五章｜遠古代謝健康 × 80個生命控制節點',
                titleEn: 'Chapter 15 | Ancestral Metabolism Health × 80 Control Nodes',
                introCn: '真正的疾病，不是器官壞掉，而是控制節點開始失靈',
                introEn: 'Disease is not organs failing, but control nodes malfunctioning',
                sections: [
                    { title: '能量控制 (1-10) | Energy Control', nodes: '粒線體ATP、NAD+、CoQ10、GLUT4、胰島素受體、AMPK、mTOR、SIRT1、PGC-1α、FOXO' },
                    { title: '抗氧化控制 (11-20) | Antioxidant Control', nodes: 'Nrf2、NF-κB、GSH、GPx、SOD、Catalase、腸道菌相、丁酸、腸道屏障、消化酵素' },
                    { title: '營養代謝控制 (21-30) | Nutrient Control', nodes: '胃酸、膽汁、肝臟解毒、Omega-3、細胞膜流動性、鋅、鎂、維生素D、β-葡聚醣、人參皂苷' },
                    { title: '系統控制 (31-80) | System Control (50+ nodes)', nodes: '免疫、發炎、循環、神經、睡眠、荷爾蒙、肝臟、腎臟、肺部、腸道、大腦、脾臟、心臟、骨骼、肌肉、皮膚與更多...' }
                ]
            }
        };

        function renderChapter(chapterId) {
            const data = chapterData[chapterId];
            if (!data) return;

            let html = `
                <div class="section-title">${data.titleCn}</div>
                <div class="section-title-en">
                    ${data.titleEn}
                    <button class="tts-btn" onclick="speakText('${data.titleEn.replace(/'/g, "\\'")}', event)">🔊</button>
                </div>
                ${data.introCn ? `
                    <p class="section-intro">${data.introCn}</p>
                    <div class="section-intro-en">
                        ${data.introEn}
                        <button class="tts-btn" onclick="speakText('${data.introEn.replace(/'/g, "\\'")}', event)">🔊</button>
                    </div>
                ` : ''}
                <div class="legend">
                    <div class="legend-title">📌 本章內容 / Chapter Content</div>
                    <p>點擊卡片展開詳細內容 / Click to expand details</p>
                </div>
            `;

            if (chapterId === 'ch2' && data.products) {
                html += '<div class="grid-1col">';
                data.products.forEach(prod => {
                    html += `
                        <div class="card" onclick="toggleCard(this)">
                            <div class="card-header">
                                <div class="card-titles">
                                    <div class="card-title-cn">${prod.num} ${prod.name}</div>
                                    <div class="card-title-en">${prod.en} <button class="tts-btn" onclick="speakText('${prod.en.replace(/'/g, "\\'")}', event)">🔊</button></div>
                                </div>
                                <span class="expand-icon">▼</span>
                            </div>
                            <div class="card-content">
                                <div class="bilingual-section">
                                    <div class="label">價格 | Price</div>
                                    <div class="text-cn">${prod.price}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            } else if (data.systems) {
                html += '<div class="grid-2col">';
                data.systems.forEach((sys, idx) => {
                    const enKey = Object.keys(sys).find(k => k.includes('En') || k.includes('en'));
                    html += `
                        <div class="card" onclick="toggleCard(this)">
                            <div class="card-header">
                                <div class="card-titles">
                                    <div class="card-title-cn">${sys.num ? sys.num + '. ' : ''}${sys.cn}</div>
                                    <div class="card-title-en">${sys.en} <button class="tts-btn" onclick="speakText('${sys.en.replace(/'/g, "\\'")}', event)">🔊</button></div>
                                </div>
                                <span class="expand-icon">▼</span>
                            </div>
                            <div class="card-content">
                                ${Object.entries(sys).filter(([k, v]) => !k.includes('cn') && !k.includes('en') && k !== 'num' && typeof v === 'string').map(([k, v]) => `
                                    <div class="bilingual-section">
                                        <div class="label">${k}</div>
                                        <div class="text-cn">${v}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            } else if (data.abilities) {
                html += '<div class="grid-2col">';
                data.abilities.forEach(ab => {
                    html += `
                        <div class="card" onclick="toggleCard(this)">
                            <div class="card-header">
                                <div class="card-titles">
                                    <div class="card-title-cn">${ab.num} | ${ab.items.join(', ').substring(0, 30)}...</div>
                                </div>
                                <span class="expand-icon">▼</span>
                            </div>
                            <div class="card-content">
                                <div class="system-comparison">
                                    ${ab.items.map(item => `<div>• ${item}</div>`).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            } else if (data.categories) {
                html += '<div class="grid-1col">';
                data.categories.forEach(cat => {
                    html += `
                        <div class="card" onclick="toggleCard(this)">
                            <div class="card-header">
                                <div class="card-titles">
                                    <div class="card-title-cn">${cat.title.split('|')[0].trim()}</div>
                                    <div class="card-title-en">${cat.title.split('|')[1].trim()} <button class="tts-btn" onclick="speakText('${cat.title.split('|')[1].trim().replace(/'/g, "\\'")}', event)">🔊</button></div>
                                </div>
                                <span class="expand-icon">▼</span>
                            </div>
                            <div class="card-content">
                                <div class="system-comparison">
                                    ${cat.items}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            } else if (data.sections) {
                html += '<div class="grid-1col">';
                data.sections.forEach(sec => {
                    html += `
                        <div class="card" onclick="toggleCard(this)">
                            <div class="card-header">
                                <div class="card-titles">
                                    <div class="card-title-cn">${sec.title}</div>
                                </div>
                                <span class="expand-icon">▼</span>
                            </div>
                            <div class="card-content">
                                <div class="system-comparison">
                                    ${sec.nodes}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            document.getElementById('mainContent').innerHTML = html;
        }

        function toggleCard(el) { el.classList.toggle('expanded'); }
        function speakText(text, e) {
            e.stopPropagation();
            if ('speechSynthesis' in window) {
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'en-US';
                u.rate = 0.9;
                const btn = e.target;
                btn.textContent = '⏳';
                btn.disabled = true;
                u.onend = () => { btn.textContent = '🔊'; btn.disabled = false; };
                u.onerror = () => { btn.textContent = '🔊'; btn.disabled = false; };
                speechSynthesis.speak(u);
            }
        }

        document.querySelectorAll('.chapter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.chapter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderChapter(e.target.dataset.chapter);
            });
        });

        renderChapter('ch1');
    </script>
</body>
